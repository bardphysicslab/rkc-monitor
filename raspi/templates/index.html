<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      :root {
        --bg: #050505;
        --panel: #111111;
        --panel-border: #2f2f2f;
        --text: #f5f5f5;
        --muted: #a7a7a7;
        --ok: #52d273;
        --warn: #ffcf5c;
        --bad: #ff7b7b;
        --bard-red: #c9232d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .shell {
        max-width: 1440px;
        margin: 0 auto;
        padding: 0 20px 40px;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 18px 0;
        background: rgba(5, 5, 5, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
        min-width: 0;
      }

      .header-left img {
        height: 48px;
        width: auto;
      }

      .header-title {
        margin: 0;
        font-size: 26px;
        line-height: 1.1;
      }

      .clock {
        white-space: nowrap;
        text-align: right;
        font-size: 17px;
        color: rgba(255, 255, 255, 0.86);
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px 24px;
        padding: 18px 0;
        color: var(--muted);
        font-size: 14px;
      }

      .summary strong {
        color: var(--text);
      }

      .node-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 14px;
      }

      .node-card {
        min-height: 168px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      .node-card.alarm {
        border-color: var(--bard-red);
      }

      .node-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .node-title {
        min-width: 0;
      }

      .node-name {
        overflow-wrap: anywhere;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.2;
      }

      .node-location {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.3;
      }

      .status {
        flex: 0 0 auto;
        border-radius: 999px;
        border: 1px solid currentColor;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
        color: var(--ok);
      }

      .status.alarm {
        color: var(--bard-red);
        animation: alarm-flash 1s steps(2, start) infinite;
      }

      .status.warn {
        color: var(--warn);
      }

      .status.bad {
        color: var(--bad);
      }

      .node-values {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .metric-label {
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .metric-value {
        min-height: 34px;
        overflow-wrap: anywhere;
        font-size: 24px;
        font-weight: 750;
        line-height: 1.1;
      }

      .metric-unit {
        margin-left: 4px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
      }

      .last-seen {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
      }

      .empty {
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        padding: 20px;
        color: var(--muted);
        background: var(--panel);
      }

      .alarm-active {
        animation: alarm-flash 1s steps(2, start) infinite;
      }

      @keyframes alarm-flash {
        0% {
          color: var(--bard-red);
        }
        50% {
          color: var(--text);
        }
        100% {
          color: var(--bard-red);
        }
      }

      @media (max-width: 700px) {
        .shell {
          padding: 0 14px 28px;
        }

        .header {
          align-items: flex-start;
        }

        .header-left img {
          height: 40px;
        }

        .header-title {
          font-size: 22px;
        }

        .clock {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <div class="header-left">
          <img src="/static/Bard-Web-Logos/bard-logo-red.png" alt="Bard logo" />
          <h1 class="header-title">{{ title }}</h1>
        </div>
        <div class="clock">
          <div id="clock-local">--:--:--</div>
          <div id="clock-utc" style="font-size: 12px; color: var(--muted); margin-top: 4px;">UTC --</div>
        </div>
      </div>

      <div class="summary">
        <div><strong id="app_id">{{ app_id }}</strong></div>
        <div><span id="node_count">0</span> nodes</div>
        <div>Time: <span id="time_status">system</span></div>
      </div>

      <div id="node-grid" class="node-grid"></div>
    </div>

    <script>
      const pollIntervalMs = {{ poll_interval_ms }};

      function formatTemp(value) {
        if (value === null || value === undefined) return "—";
        return `${Number(value).toFixed(2)}`;
      }

      function formatDoor(value) {
        if (value === null || value === undefined) return "—";
        return value ? "Open" : "Closed";
      }

      function formatTimestamp(value) {
        if (!value) return "—";
        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) return value;
        return parsed.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }

      function getNodeMeta(reading) {
        const extended = reading?.extended || {};
        return {
          uid: reading?.uid || extended.uid || "unknown",
          name: extended.name || reading?.uid || extended.uid || "Unknown node",
          location: extended.location || "—",
          host: extended.host || "—",
          port: extended.port ?? "—",
        };
      }

      function getStatus(reading) {
        const data = reading?.data || {};
        const extended = reading?.extended || {};

        if (extended.node_reachable === false) {
          return { label: "Node offline", className: "bad" };
        }

        if (extended.error === "sensor_fail") {
          return { label: "Sensor error", className: "warn" };
        }

        if (data.door_alarm === true) {
          return { label: "ALARM", className: "alarm" };
        }

        return { label: "OK", className: "" };
      }

      function renderReadings(readings) {
        const grid = document.getElementById("node-grid");
        if (!grid) return;

        if (!readings.length) {
          grid.innerHTML = '<div class="empty">No nodes configured.</div>';
          return;
        }

        grid.replaceChildren(...readings.map((reading) => {
          const meta = getNodeMeta(reading);
          const data = reading.data || {};
          const extended = reading.extended || {};
          const status = getStatus(reading);
          const card = document.createElement("article");
          card.className = `node-card ${data.door_alarm === true ? "alarm" : ""}`;
          card.dataset.uid = meta.uid;
          card.dataset.error = extended.error || "";
          card.dataset.nodeReachable =
            extended.node_reachable === undefined ? "" : String(extended.node_reachable);
          card.title = `${meta.host}:${meta.port} error=${card.dataset.error || "none"} node_reachable=${card.dataset.nodeReachable || "unknown"}`;

          const temp = formatTemp(data.temp_c);
          const tempUnit = temp === "—" ? "" : '<span class="metric-unit">°C</span>';
          const alarmClass = data.door_alarm === true ? " alarm-active" : "";

          card.innerHTML = `
            <div class="node-head">
              <div class="node-title">
                <div class="node-name"></div>
                <div class="node-location"></div>
              </div>
              <div class="status ${status.className}"></div>
            </div>
            <div class="node-values">
              <div>
                <div class="metric-label">Temp</div>
                <div class="metric-value">${temp}${tempUnit}</div>
              </div>
              <div>
                <div class="metric-label">Door</div>
                <div class="metric-value${alarmClass}">${formatDoor(data.door_open)}</div>
              </div>
            </div>
            <div class="last-seen">Last seen: ${formatTimestamp(reading.timestamp)}</div>
          `;
          card.querySelector(".node-name").textContent = meta.name;
          card.querySelector(".node-location").textContent = meta.location;
          card.querySelector(".status").textContent = status.label;
          return card;
        }));
      }

      async function refreshTime() {
        const r = await fetch("/time");
        const j = await r.json();
        document.getElementById("clock-local").textContent = j.local || "—";
        document.getElementById("clock-utc").textContent = `UTC ${j.utc || "—"}`;
        document.getElementById("time_status").textContent = j.time_status?.source || "unknown";
      }

      async function refreshInfo() {
        const r = await fetch("/app/info");
        const info = await r.json();
        document.getElementById("app_id").textContent = info.app_id || "—";
        document.getElementById("node_count").textContent = String(info.node_count ?? 0);
      }

      async function refreshReadings() {
        const r = await fetch("/readings/latest");
        const j = await r.json();
        renderReadings(j.readings || []);
      }

      async function tick() {
        try {
          await Promise.all([refreshTime(), refreshInfo(), refreshReadings()]);
        } catch (err) {
          console.error("Dashboard refresh failed", err);
        }
      }

      tick();
      setInterval(tick, pollIntervalMs);
    </script>
  </body>
</html>
